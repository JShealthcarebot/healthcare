
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>飲食紀錄</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    .top-right-buttons {
      position: absolute;
      top: 10px;
      right: 60px;
      display: flex;
      gap: 10px;
    }
    .chart-container {
      width: 100%;
      max-width: 500px;
      margin: auto;
    }
  </style>
</head>
<body>
  <div class="top-right-buttons">
    <button onclick="goToMainMenu()">主選單</button>
    <button onclick="logout()">登出</button>
  </div>
  <div class="card">
    <h2>飲食紀錄</h2>
    <button onclick="toggleChart()">展開/折疊圖表</button>
    <div id="chartSection" style="display: none;">
      <div class="chart-container">
        <canvas id="dietChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    function goToMainMenu() {
      window.location.href = "main.html";
    }
    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "index.html";
    }

    function toggleChart() {
      const section = document.getElementById("chartSection");
      section.style.display = section.style.display === "none" ? "block" : "none";
      if (section.style.display === "block") {
        renderCharts();
      }
    }

    function renderCharts() {
      const account = localStorage.getItem("currentUser") || "guest";
      const records = JSON.parse(localStorage.getItem("diet_" + account) || "[]");

      const labels = records.map(r => r.food);
      const calories = records.map(r => parseFloat(r.calories));
      const prices = records.map(r => parseFloat(r.price));

      // 清空已有圖表
      if (window.calorieChartObj) window.calorieChartObj.destroy();
      if (window.priceChartObj) window.priceChartObj.destroy();

      const ctx1 = document.getElementById('dietChart').getContext('2d');
      window.calorieChartObj = new Chart(ctx1, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            label: '熱量 (kcal)',
            data: calories,
            backgroundColor: ['#ff6384', '#36a2eb', '#ffcd56', '#4bc0c0', '#9966ff']
          }]
        }
      });

      const ctx2 = document.getElementById('priceChart').getContext('2d');
      window.priceChartObj = new Chart(ctx2, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            label: '價格 (元)',
            data: prices,
            backgroundColor: ['#8e5ea2', '#3cba9f', '#e8c3b9', '#c45850', '#a2d2ff']
          }]
        }
      });
    }
  </script>
</body>
</html>
