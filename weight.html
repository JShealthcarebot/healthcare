
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>體重紀錄 v3.1 | Health Care</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: linear-gradient(to bottom, #f0f4f8, #ffffff);
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .card {
      background: white;
      margin-top: 40px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .top-buttons {
      width: 100%;
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .logout-btn, .menu-btn {
      background-color: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      width: 60px;
      height: 26px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .menu-btn {
      background-color: #3498db;
    }
    h2 {
      margin: 10px 0 5px 0;
      font-size: 22px;
      color: #2c3e50;
    }
    .slogan, .encourage {
      font-size: 14px;
      color: #555;
      text-align: center;
      margin-bottom: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button.action {
      background-color: #4CAF50;
      color: white;
      border: none;
    }
    .control-row {
      display: flex;
      gap: 5px;
      width: 100%;
    }
    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
    }
    canvas {
      margin-top: 20px;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-buttons">
      <button class="menu-btn" onclick="goMenu()">主選單</button>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
    <h2>體重紀錄 📉</h2>
    <p class="slogan">紀錄開始，健康就在不遠處！</p>

    <input type="number" id="weightInput" placeholder="請輸入今天的體重 (kg)">
    <button class="action" onclick="addWeight()">記錄體重</button>

    <div class="control-row">
      <input type="date" id="startDate">
      <input type="date" id="endDate">
    </div>
    <div class="control-row">
      <button class="action" onclick="filterRecords()">篩選</button>
      <button class="action" onclick="clearFiltered()">清除篩選資料</button>
      <button class="action" onclick="exportData()">匯出備份</button>
    </div>

    <p class="encourage" id="encourageText"></p>

    <table id="recordTable"><thead><tr><th>時間</th><th>體重 (kg)</th><th>操作</th></tr></thead><tbody></tbody></table>
    <canvas id="weightChart" height="200"></canvas>
  </div>

  <script>
    const user = localStorage.getItem("currentUser") || "guest";
    const storageKey = `weightRecords_${user}`;
    let records = JSON.parse(localStorage.getItem(storageKey)) || [];
    let filtered = [...records];

    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "index.html";
    }

    function goMenu() {
      window.location.href = "main.html";
    }

    function addWeight() {
      const val = parseFloat(document.getElementById("weightInput").value);
      if (!val) return alert("請輸入有效的體重！");
      const now = new Date();
      const time = now.toLocaleString();
      const record = { time, weight: val };
      records.push(record);
      localStorage.setItem(storageKey, JSON.stringify(records));
      document.getElementById("weightInput").value = "";
      render();
      showEncouragement(val);
    }

    function deleteRecord(index) {
      records.splice(index, 1);
      localStorage.setItem(storageKey, JSON.stringify(records));
      render();
    }

    function filterRecords() {
      const start = new Date(document.getElementById("startDate").value);
      const end = new Date(document.getElementById("endDate").value);
      filtered = records.filter(r => {
        const d = new Date(r.time);
        return (!isNaN(start) ? d >= start : true) && (!isNaN(end) ? d <= end : true);
      });
      renderTable();
      renderChart();
    }

    function clearFiltered() {
      const start = new Date(document.getElementById("startDate").value);
      const end = new Date(document.getElementById("endDate").value);
      records = records.filter(r => {
        const d = new Date(r.time);
        return (isNaN(start) || d < start) || (isNaN(end) || d > end);
      });
      localStorage.setItem(storageKey, JSON.stringify(records));
      filtered = [...records];
      render();
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `weight-backup-${user}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showEncouragement(current) {
      const t = document.getElementById("encourageText");
      if (records.length < 2) {
        t.textContent = "你已經開始記錄，很棒！👍";
        return;
      }
      const prev = records[records.length - 2].weight;
      if (current < prev) {
        t.textContent = "🎉 體重下降了，繼續保持！";
      } else if (current > prev) {
        t.textContent = "😅 有點上升，別氣餒，明天繼續！";
      } else {
        t.textContent = "😐 體重沒變，記得動一動哦～";
      }
    }

    function renderTable() {
      const tbody = document.querySelector("#recordTable tbody");
      tbody.innerHTML = "";
      filtered.forEach((r, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${r.time}</td><td>${r.weight}</td>
          <td><button onclick="deleteRecord(${records.indexOf(r)})">刪除</button></td>`;
        tbody.appendChild(tr);
      });
    }

    function renderChart() {
      const ctx = document.getElementById('weightChart').getContext('2d');
      if (window.weightChart) window.weightChart.destroy();
      const labels = filtered.map(r => r.time);
      const data = filtered.map(r => r.weight);
      window.weightChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: "體重變化",
            data,
            fill: false,
            borderColor: "#3498db",
            tension: 0.1
          }]
        },
        options: {
          responsive: true,
          scales: {
            x: { display: false },
            y: { beginAtZero: false }
          }
        }
      });
    }

    function render() {
      filtered = [...records];
      renderTable();
      renderChart();
    }

    render();
  </script>
</body>
</html>
