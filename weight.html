
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>體重記錄</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
  <style>
    canvas#weightChart {
      height: 300px !important;
    }
    .toggle-chart-btn {
      margin-top: 10px;
      background: linear-gradient(to right, #6ec6ff, #2196f3);
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .toggle-chart-btn:hover {
      background: #1e88e5;
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <h2>體重記錄頁面</h2>
  <input type="date" id="startDate" placeholder="請選擇開始日期">
  <input type="date" id="endDate" placeholder="請選擇結束日期">
  <button class="toggle-chart-btn" onclick="toggleChart()">📉 顯示趨勢圖</button>
  <div id="chartSection" style="display:none;">
    <canvas id="weightChart" height="300"></canvas>
  </div>

  <script>
    const records = [
      { weight: 60, timestamp: new Date("2025-08-01T08:00:00").getTime() },
      { weight: 63, timestamp: new Date("2025-08-02T08:00:00").getTime() },
    ];

    let weightChart;

    function toggleChart() {
      const chartSection = document.getElementById("chartSection");
      const btn = document.querySelector(".toggle-chart-btn");
      if (chartSection.style.display === "none") {
        chartSection.style.display = "block";
        btn.textContent = "📉 隱藏趨勢圖";
        setTimeout(() => { renderChart(); }, 100);
      } else {
        chartSection.style.display = "none";
        btn.textContent = "📉 顯示趨勢圖";
      }
    }

    function renderChart() {
      const labels = records.map(r => new Date(r.timestamp).toLocaleString("sv-SE"));
      const data = records.map(r => r.weight);

      console.log("📊 資料筆數：", records.length);
      console.log("📊 標籤資料：", labels);
      console.log("📊 體重資料：", data);

      const ctx = document.getElementById("weightChart").getContext("2d");
      if (weightChart) weightChart.destroy();
      weightChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: "體重 (kg)",
            data: data,
            borderColor: "rgba(54, 162, 235, 1)",
            pointBackgroundColor: "red",
            pointBorderWidth: 2,
            pointRadius: 5,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            title: {
              display: true,
              text: "體重變化趨勢圖",
              font: { size: 16 }
            }
          },
          scales: {
            x: {
              type: "category",
              title: {
                display: true,
                text: "日期時間"
              }
            },
            y: {
              title: {
                display: true,
                text: "體重 (kg)"
              }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
