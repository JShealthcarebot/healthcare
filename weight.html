
<!DOCTYPE html>

<html lang="zh-Hant">
<head>

<style>
    body {
      background: linear-gradient(to bottom, #f0f4f8, #ffffff);
      font-family: "Segoe UI", sans-serif;

      padding: 0;

    }
    .card {
      background: white;

      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .top-buttons {
      width: 100%;
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .logout-btn, .menu-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  width: auto;
  padding: 0 14px;
  height: 30px;
      background-color: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      width: 60px;
      height: 30px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  width: auto;
  padding: 0 14px;
  height: 30px;
      background-color: #3498db;
    }
    h2 {
      margin: 10px 0 5px 0;
      font-size: 22px;
      color: #2c3e50;
    }
    .slogan, .encourage {
      font-size: 14px;
      color: #555;
      text-align: center;
      margin-bottom: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;

      border-radius: 8px;

      box-sizing: border-box;
    }
    button.action {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;

    .control-row > * {
      flex: 1 1 45%;
    }
    table {
      width: 100%;

      border-collapse: collapse;

    .toggle-chart-btn {
      margin-top: 10px;
      background: linear-gradient(to right, #6ec6ff, #2196f3);
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 10px;

<body>
<div class="card">
<div class="top-buttons">
<button class="menu-btn" onclick="location.href='main.html'">主選單</button>
<button class="logout-btn" onclick="localStorage.removeItem('currentUser'); location.href='index.html'">登出</button>
</div>
<h2>體重紀錄 📉</h2>
<p class="slogan">載入中...</p>
<input id="weightInput" placeholder="請輸入今天的體重 (kg)" type="number"/>
<button class="action" onclick="saveWeightRecord()">記錄體重</button>
<div class="control-row">
<input id="startDate" type="date"/>
<input id="endDate" type="date"/>
<button class="action" onclick="filterRecords()">篩選</button>
<button class="action" onclick="clearSelectedRecords()">清除所選時間紀錄</button>
<button class="action" onclick="clearAll()">清除所有紀錄</button>
</div>
<div class="control-row">
<button class="action" onclick="exportToExcel()">匯出 Excel</button>
<input accept=".xlsx" onchange="importExcel(this)" type="file"/>
</div>
<p class="encourage" id="encourageText"></p>
<table id="recordTable"><thead><tr><th>時間</th><th>體重 (kg)</th><th>操作</th></tr></thead><tbody id="recordsBody"></tbody></table>
<button class="toggle-chart-btn" onclick="toggleChart()">📉 顯示趨勢圖</button>
<div id="chartSection" style="display: none;">
<canvas height="200" id="weightChart"></canvas></div>
</div>
<script>
let weightChart;

function toggleChart() {
  const section = document.getElementById("chartSection");
  const btn = document.querySelector(".toggle-chart-btn");
  if (section.style.display === "none") {
    section.style.display = "block";
    btn.innerHTML = "📉 隱藏趨勢圖";
    setTimeout(renderChart, 100);
  } else {
    section.style.display = "none";
    btn.innerHTML = "📉 顯示趨勢圖";
  }
}

function renderChart() {
  const data = JSON.parse(localStorage.getItem(currentUserKey()) || "[]");
  if (!data.length) return;

  const labels = data.map(r => new Date(r.time).toLocaleString("sv-SE"));
  const weights = data.map(r => r.weight);

  const ctx = document.getElementById("weightChart").getContext("2d");
  if (weightChart) weightChart.destroy();

  weightChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "體重 (kg)",
        data: weights,
        borderColor: "blue",
        backgroundColor: "rgba(75,192,192,0.1)",
        pointBorderColor: "red",
        pointRadius: 5,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true },
        title: {
          display: true,
          text: "體重變化趨勢圖"
        }
      },
      scales: {
        x: { type: "category", title: { display: true, text: "時間" } },
        y: { title: { display: true, text: "體重 (kg)" } }
      }
    }
  });
}

function currentUserKey() {
  return "weightRecords_" + (localStorage.getItem("currentUser") || "default");
}
</script><script>
function getCurrentUserKey() {
  return "weightRecords_" + (localStorage.getItem("currentUser") || "default");
}

function saveWeightRecord() {
  const input = document.getElementById("weightInput");
  const weight = parseFloat(input.value);
  if (isNaN(weight)) {
    alert("請輸入有效的體重數字");
    return;
  }
  const records = JSON.parse(localStorage.getItem(getCurrentUserKey()) || "[]");
  const now = new Date();
  records.push({ time: now.toISOString(), weight });
  localStorage.setItem(getCurrentUserKey(), JSON.stringify(records));
  input.value = "";
  showRecords();
  renderChart(); // 更新圖表
}

function showRecords() {
  const records = JSON.parse(localStorage.getItem(getCurrentUserKey()) || "[]");
  const tbody = document.getElementById("recordsBody");
  tbody.innerHTML = "";
  records.forEach((r, i) => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${new Date(r.time).toLocaleString("zh-TW")}</td>
      <td>${r.weight}</td>
      <td><button onclick="deleteRecord(${i})">刪除</button></td>
    `;
    tbody.appendChild(row);
  });
}

function deleteRecord(index) {
  const records = JSON.parse(localStorage.getItem(getCurrentUserKey()) || "[]");
  records.splice(index, 1);
  localStorage.setItem(getCurrentUserKey(), JSON.stringify(records));
  showRecords();
  renderChart();
}

window.onload = () => {
  showRecords();
};
</script></body>
</html>
