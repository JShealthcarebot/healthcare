
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>運動紀錄</title>
  <style>
    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #e3f6fc;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: auto;
    }
    .input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    select.input {
      background-color: #f7f7f7;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>運動紀錄</h2>
    <select id="exerciseType" class="input" onchange="switchType()">
      <option value="time">時間型</option>
      <option value="weight">重量型</option>
    </select>
    <input id="field1" class="input" placeholder="運動類型（如：跑步機）" />
    <input id="field2" class="input" placeholder="運動時間（分鐘）" />
    <input id="field3" class="input" placeholder="消耗卡路里（kcal）" />
    <input id="field4" class="input" placeholder="坡度（可選）" />
    <input id="field5" class="input" placeholder="速度（可選）" />
  </div>

  <script>
    function switchType() {
      const type = document.getElementById('exerciseType').value;
      const f1 = document.getElementById('field1');
      const f2 = document.getElementById('field2');
      const f3 = document.getElementById('field3');
      const f4 = document.getElementById('field4');
      const f5 = document.getElementById('field5');

      if (type === 'time') {
        f1.placeholder = "運動類型（如：跑步機）";
        f2.placeholder = "運動時間（分鐘）";
        f3.placeholder = "消耗卡路里（kcal）";
        f4.placeholder = "坡度（可選）";
        f5.placeholder = "速度（可選）";
      } else {
        f1.placeholder = "運動類型（如：深蹲）";
        f2.placeholder = "重量（kg，可選）";
        f3.placeholder = "組數";
        f4.placeholder = "每組次數";
        f5.placeholder = "";
      }
    }

    // 預設切換一次
    switchType();
  </script>
</body>
</html>
