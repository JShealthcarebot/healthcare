<link href="style.css" rel="stylesheet"/></head>
<body><img id="avatarImage" onclick="window.location.href='profile.html'" src="avatar-neutral.png" style="position: absolute; top: 12px; right: 16px; width: 48px; height: 48px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3); cursor: pointer;"/>
<div class="card">
<button class="menu-btn" onclick="goMenu()">дё»йҒёе–®</button>
<button class="logout-btn" onclick="logout()">зҷ»еҮә</button>
<h2>йҒӢеӢ•зҙҖйҢ„ рҹҸғвҖҚвҷҖпёҸ</h2>
<p class="slogan">йҖҷиЈЎжҳҜ йҒӢеӢ•зҙҖйҢ„ рҹҸғвҖҚвҷҖпёҸпјҢи®“жҲ‘еҖ‘дёҖиө·и®ҠеҒҘеә·пјҒрҹҳ„</p>
<!-- Placeholder for future content -->
</div>
<script src="script.js">
window.addEventListener("load", () => {
  const profile = JSON.parse(localStorage.getItem("profile") || "{}");
  const avatarImage = document.getElementById("avatarImage");
  if (avatarImage) {
    if (profile.gender === "male") avatarImage.src = "avatar-male.png";
    else if (profile.gender === "female") avatarImage.src = "avatar-female.png";
    else avatarImage.src = "avatar-neutral.png";
  }
});
</script></body>
