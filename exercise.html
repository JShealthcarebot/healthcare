<input id="reps" placeholder="每組次數" type="number"/>
</div>

<input id="exerciseTypeTime" placeholder="運動類型（如：跑步）" type="text"/>
<input id="duration" placeholder="運動時數（分鐘）" type="number"/>

<script>
const currentUser = localStorage.getItem("currentUser") || "guest";
const recordKey = `exerciseRecords_${currentUser}`;

// 初始化載入紀錄
window.onload = function () {
  renderRecords();
};

function addRecord() {
  const date = document.getElementById("exerciseDate")?.value || "";
  const type = document.getElementById("exerciseType")?.value || "";
  const duration = document.getElementById("exerciseDuration")?.value || "";
  const calories = document.getElementById("caloriesBurned")?.value || "";

  if (!date || !type || !duration || !calories) {
    alert("請完整填寫所有欄位！");
    return;
  }

  const record = { date, type, duration, calories };
  const records = JSON.parse(localStorage.getItem(recordKey)) || [];
  records.push(record);
  localStorage.setItem(recordKey, JSON.stringify(records));
  renderRecords();
}

function renderRecords() {
  const records = JSON.parse(localStorage.getItem(recordKey)) || [];
  const container = document.getElementById("exerciseRecords");
  container.innerHTML = "";

  records.forEach((rec) => {
    const card = document.createElement("div");
    card.className = "record-card";
    card.innerHTML = `
      <p>📅 ${rec.date}</p>
      <p>🏋️‍♀️ ${rec.type}</p>
      <p>⏱️ ${rec.duration} 分鐘</p>
      <p>🔥 ${rec.calories} kcal</p>
    `;
    container.appendChild(card);
  });
}
</script>

    container.appendChild(card);
  });
}
</script>
