
<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>主選單 | Health Care</title>
<style>
    body {
      background: linear-gradient(to bottom, #f0f4f8, #ffffff);
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .card {
      background: white;
      margin-top: 70px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logout-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background-color: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      width: 40px;
      height: 26px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .logout-btn:hover {
      background-color: #c0392b;
    }
    h2 {
      margin-top: 0;
      font-size: 22px;
      color: #2c3e50;
    }
    .slogan {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
      text-align: center;
    }
    .menu-btn {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      background-color: #3498db;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }
    .menu-btn:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body><img id="avatarImage" onclick="window.location.href='profile.html'" src="avatar-neutral.png" style="position: absolute; top: 12px; right: 16px; width: 48px; height: 48px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3); cursor: pointer;"/>
<div class="card">
<button class="logout-btn">登出</button>
<h2>主選單</h2>
<p class="slogan">載入中...</p>
<button class="menu-btn" onclick="location.href='weight.html'">體重紀錄</button>
<button class="menu-btn" onclick="location.href='diet.html'">飲食紀錄</button>
<button class="menu-btn" onclick="location.href='exercise.html'">運動紀錄</button>
<button class="menu-btn" onclick="location.href='water.html'">飲水紀錄</button>
<button class="menu-btn" onclick="location.href='overview.html'">健康總覽</button>
</div>
<script>
    document.querySelector(".logout-btn").addEventListener("click", function () {
      localStorage.removeItem("currentUser");
      window.location.href = "index.html";
    });

    const slogans = [
      "今天吃的少一點，快樂多一點 😋",
      "健康不是口號，是行動！🏃",
      "紀錄一下，瘦得比較快 📉",
      "體重不會說謊，紀錄不會背叛你 💪",
      "追蹤健康，就從這裡開始！🩺",
      "別讓體重偷偷上升，今天開始行動！⏱️",
      "喝水、運動、記錄體重，三步驟搞定！💦",
      "你打開這個 App 的樣子真帥 💼"
    ];
    document.querySelector(".slogan").textContent =
      slogans[Math.floor(Math.random() * slogans.length)];
  
window.addEventListener("load", () => {
  const profile = JSON.parse(localStorage.getItem("profile") || "{}");
  const avatarImage = document.getElementById("avatarImage");
  if (avatarImage) {
    if (profile.gender === "male") avatarImage.src = "avatar-male.png";
    else if (profile.gender === "female") avatarImage.src = "avatar-female.png";
    else avatarImage.src = "avatar-neutral.png";
  }
});
</script>
</body>
</html>
